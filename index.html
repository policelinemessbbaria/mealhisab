<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>আমার মেস - জেলা পুলিশ লাইন্স মেস, ব্রাহ্মণবাড়িয়া</title>
    
    <!-- SEO Meta Tags (Google Search Console এর জন্য) -->
    <meta name="description" content="জেলা পুলিশ লাইন্স মেস, ব্রাহ্মণবাড়িয়ার অফিসিয়াল মিল ম্যানেজমেন্ট সিস্টেম। এখানে মেসের সকল সদস্যের মিল হিসাব, বিল এবং ম্যানেজমেন্ট সিস্টেম ডিজিটাল পদ্ধতিতে পরিচালিত হয়।">
    <meta name="keywords" content="আমার মেস, amar mess, পুলিশ লাইন মেস ব্রাহ্মণবাড়িয়া, police line mess brahmanbaria, মিল হিসাব ব্রাহ্মণবাড়িয়া, meal hisab brahmanbaria, mil hisab brahmanbaria, মেসের হিসাব ব্রাহ্মণবাড়িয়া, messer hisab brahmanbaria, ব্রাহ্মণবাড়িয়া পুলিশ লাইন, বাংলাদেশ পুলিশ মেস ম্যানেজমেন্ট">
    <meta name="author" content="District Police Lines Mess Brahmanbaria">
    <meta name="robots" content="index, follow">

    <!-- PWA Manifest Link (মোবাইলে ইন্সটল করার জন্য) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a237e">

    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* বেসিক রিসেট */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f7f9fc;
            overflow: hidden; 
            position: fixed; 
        }

        /* লোডিং স্ক্রিনের ডিজাইন */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            max-width: 80%;
            animation: fadeIn 1.2s ease-in-out;
        }

        .police-logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        .loading-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a237e;
            margin-top: 5px;
            line-height: 1.3;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
        }

        .spinner {
            margin-top: 30px;
            width: 35px;
            height: 35px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #1a237e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; 
            -webkit-overflow-scrolling: touch; 
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-content">
            <img src="https://i.postimg.cc/28P4SX2q/image-181637.webp" alt="Police Logo" class="police-logo">
            
            <div class="loading-text">জেলা পুলিশ লাইন্স মেস</div>
            <div class="sub-text">ব্রাহ্মণবাড়িয়া</div>
            <div class="sub-text" style="font-size: 0.8rem; margin-top: 2px;">মিল ম্যানেজমেন্ট সিস্টেম</div>
            
            <div class="spinner"></div>
        </div>
    </div>

    <iframe id="appFrame" title="Meal Management App"></iframe>

    <script>
        const baseAppUrl = "https://script.google.com/macros/s/AKfycbyQzn7pmdLEQXy7E5Regh2PABjRkCnbXvb6x88cRf4xHAcyZg_O95t4X3lBBZzWQl2J/exec";

        function loadApp() {
            const loadingScreen = document.getElementById('loading-screen');
            const iframe = document.getElementById('appFrame');
            
            const timestamp = new Date().getTime();
            const urlWithCacheBusting = baseAppUrl + (baseAppUrl.includes('?') ? '&' : '?') + '_=' + timestamp;
            
            iframe.src = urlWithCacheBusting;

            iframe.onload = function() {
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        iframe.style.display = 'block';
                    }, 500);
                }, 1500); 
            };

            setTimeout(() => {
                if(loadingScreen.style.display !== 'none') {
                    console.log('Iframe load timeout, displaying app anyway.');
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        iframe.style.display = 'block';
                    }, 500);
                }
            }, 5000);
        }

        window.addEventListener('load', loadApp);
    </script>
</body>
</html>
